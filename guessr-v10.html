<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUESSR 💕</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Playfair+Display:ital@1&display=swap');

:root {
  --bg: #0f0508;
  --sur: #1a0a10;
  --sur2: #220d15;
  --brd: #3d1a25;
  --acc: #ff6b9d;
  --acc2: #ff9ec4;
  --red: #ff3358;
  --blu: #ff85b3;
  --txt: #ffe8f0;
  --mut: #8a5568;
  --grn: #ff6b9d;
  --rose: #c8385a;
  --cream: #ffd6e7;
  --deep: #7d1535;
  --amber: #ffb347;
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-x: hidden;
}

/* ── DYNAMIC BACKGROUND ── */
.hearts-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.hearts-bg::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 30%, rgba(255,107,157,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 70%, rgba(200,56,90,0.05) 0%, transparent 70%);
  animation: ambientShift 18s ease-in-out infinite alternate;
}
@keyframes ambientShift {
  0%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.04)} 100%{opacity:0.7;transform:scale(1) translateX(20px)}
}
.heart-particle {
  position: absolute; bottom: -40px; opacity: 0;
  animation: heartRise linear infinite; user-select: none; pointer-events: none;
}
@keyframes heartRise {
  0%{transform:translateY(0) scale(0.5) rotate(-20deg);opacity:0}
  8%{opacity:0.22} 70%{opacity:0.14}
  100%{transform:translateY(-115vh) scale(1.2) rotate(25deg);opacity:0}
}
.burst-layer { position: fixed; inset: 0; pointer-events: none; z-index: 150; overflow: hidden; }
.burst-heart { position: absolute; font-size: 28px; animation: burstOut linear forwards; }
@keyframes burstOut {
  0%{opacity:1;transform:translate(0,0) scale(0.4)}
  100%{opacity:0;transform:var(--tx) scale(1.2)}
}

/* ── ARROW MODIFIER (Cupid's Arrow) ── */
.arrow-layer { position: fixed; inset: 0; pointer-events: none; z-index: 180; overflow: hidden; }
.cupid-arrow {
  position: absolute; font-size: 28px; white-space: nowrap;
  animation: arrowShoot 0.9s cubic-bezier(0.2,0,0.8,1) forwards;
}
@keyframes arrowShoot {
  0%{opacity:0;transform:translateX(-120px) scaleX(1)}
  10%{opacity:1}
  90%{opacity:1}
  100%{opacity:0;transform:translateX(calc(100vw + 120px)) scaleX(1)}
}

/* ── DRAMA FLASH ── */
.drama-flash {
  position: fixed; inset: 0; pointer-events: none; z-index: 160;
  animation: dramaFlash 0.5s ease forwards;
}
@keyframes dramaFlash {
  0%{opacity:0.7} 30%{opacity:0.4} 100%{opacity:0}
}
@keyframes screenShake {
  0%,100%{transform:translate(0,0)}
  15%{transform:translate(-8px,3px)}
  30%{transform:translate(8px,-3px)}
  45%{transform:translate(-6px,2px)}
  60%{transform:translate(6px,-2px)}
  75%{transform:translate(-3px,1px)}
  90%{transform:translate(3px,-1px)}
}

#app { position: relative; z-index: 1; width: 100%; display: flex; justify-content: center; padding: 16px 0 40px; }
.screen { width: 100%; max-width: 470px; padding: 12px; animation: fi .3s ease; }
@keyframes fi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* ── LOGO ── */
.logo {
  font-family: 'Bebas Neue', Impact, sans-serif; font-size: 58px; letter-spacing: 7px;
  color: var(--acc); text-align: center; line-height: 1; margin-bottom: 2px;
  text-shadow: 0 0 50px rgba(255,107,157,0.55), 0 0 100px rgba(255,107,157,0.15);
}
.logo-hearts { text-align: center; font-size: 13px; margin-bottom: 4px; letter-spacing: 10px; opacity: 0.4; }
.tag { text-align: center; color: var(--mut); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 28px; }

/* ── GLASS CARDS ── */
.card {
  background: rgba(26,10,16,0.85); border: 1px solid var(--brd); border-radius: 10px;
  padding: 18px; margin-bottom: 10px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.ctitle { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 15px; letter-spacing: 2.5px; color: var(--mut); margin-bottom: 14px; }
.ig { margin-bottom: 10px; }
.ig label { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--mut); margin-bottom: 5px; }

input[type=text], input[type=number] {
  width: 100%; background: rgba(15,5,8,0.8); border: 1px solid var(--brd);
  color: var(--txt); font-family: 'DM Mono', monospace; font-size: 14px;
  padding: 9px 12px; border-radius: 6px; outline: none; transition: border-color .2s, box-shadow .2s;
}
input:focus { border-color: var(--acc); box-shadow: 0 0 0 2px rgba(255,107,157,0.12); }
input::placeholder { color: var(--mut); }

@keyframes shake {
  0%,100%{transform:translateX(0)} 15%{transform:translateX(-6px)} 30%{transform:translateX(6px)}
  45%{transform:translateX(-5px)} 60%{transform:translateX(5px)} 75%{transform:translateX(-3px)} 90%{transform:translateX(3px)}
}
.shake { animation: shake 0.45s ease; border-color: var(--red) !important; }

.rr { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.presets { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 10px; }
.preset-btn {
  background: var(--sur2); border: 1px solid var(--brd); color: var(--mut);
  font-family: 'DM Mono', monospace; font-size: 10px; padding: 6px 4px;
  border-radius: 6px; cursor: pointer; text-align: center; transition: all .15s; line-height: 1.3;
}
.preset-btn:hover { border-color: var(--acc); color: var(--acc); }
.preset-btn.active { border-color: var(--acc); color: var(--acc); background: rgba(255,107,157,0.1); }

.btn { width: 100%; padding: 11px; font-family: 'Bebas Neue', Impact, sans-serif; font-size: 17px; letter-spacing: 3px; border: none; border-radius: 6px; cursor: pointer; transition: all .15s; display: block; margin-bottom: 2px; }
.bp { background: var(--acc); color: #0f0508; }
.bp:hover { background: var(--acc2); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(255,107,157,0.38); }
.bs { background: transparent; border: 1px solid var(--brd); color: var(--mut); margin-top: 6px; }
.bs:hover { border-color: var(--txt); color: var(--txt); }
.rematch-btn { background: linear-gradient(135deg, var(--rose), var(--acc)); color: #0f0508; font-size: 19px; }
.rematch-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(200,56,90,0.45); }

.err { color: var(--red); font-size: 11px; margin-top: 5px; min-height: 16px; }
.cdisp {
  font-family: 'Bebas Neue', Impact, sans-serif; font-size: 52px; letter-spacing: 12px;
  color: var(--acc); text-align: center; background: rgba(15,5,8,0.7); border: 1px solid var(--brd);
  border-radius: 8px; padding: 10px; margin-bottom: 6px; cursor: pointer; transition: all .2s;
}
.cdisp:hover { border-color: var(--acc); box-shadow: 0 0 20px rgba(255,107,157,0.18); }
.chint { text-align: center; font-size: 10px; color: var(--mut); letter-spacing: 1px; margin-bottom: 16px; }
.pl { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; min-height: 32px; }
.chip { background: var(--sur2); border: 1px solid var(--brd); border-radius: 20px; padding: 5px 12px; font-size: 12px; display: flex; align-items: center; gap: 5px; }
.chip.host { border-color: var(--acc); color: var(--acc); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--grn); animation: pulse 2s infinite; flex-shrink: 0; }
.chip.host .dot { background: var(--acc); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.sl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--mut); margin-bottom: 8px; }

/* ── MODIFIER SCREEN ── */
.mod-screen-header { text-align: center; margin-bottom: 18px; }
.mod-screen-title { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--acc); }
.mod-screen-sub { font-size: 10px; color: var(--mut); letter-spacing: 2px; margin-top: 3px; }

.mod-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

.mod-card {
  background: rgba(26,10,16,0.9); border: 1px solid var(--brd); border-radius: 12px;
  padding: 14px 12px; text-align: center; position: relative; transition: all .2s;
  cursor: default;
}
.mod-card.visual-mod { border-top: 2px solid rgba(255,133,179,0.4); }
.mod-card.gameplay-mod { border-top: 2px solid rgba(200,56,90,0.4); }
.mod-card.both-voted {
  border-color: var(--acc);
  box-shadow: 0 0 20px rgba(255,107,157,0.2), 0 0 0 1px var(--acc) inset;
  animation: modGlow 1.5s ease-in-out infinite;
}
@keyframes modGlow {
  0%,100%{box-shadow:0 0 16px rgba(255,107,157,0.2),0 0 0 1px var(--acc) inset}
  50%{box-shadow:0 0 30px rgba(255,107,157,0.38),0 0 0 1px var(--acc) inset}
}

.mod-type-badge {
  display: inline-block; font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 20px; margin-bottom: 8px; font-family: 'DM Mono', monospace;
}
.mod-type-badge.visual { background: rgba(255,133,179,0.15); color: var(--blu); border: 1px solid rgba(255,133,179,0.3); }
.mod-type-badge.gameplay { background: rgba(200,56,90,0.15); color: var(--rose); border: 1px solid rgba(200,56,90,0.3); }

.mod-icon { font-size: 30px; display: block; margin-bottom: 6px; }
.mod-name { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--txt); margin-bottom: 4px; }
.mod-desc { font-size: 9px; color: var(--mut); line-height: 1.5; margin-bottom: 10px; }

.mod-vote-btn {
  width: 100%; padding: 7px; font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 13px; letter-spacing: 2px; border-radius: 6px; cursor: pointer;
  transition: all .15s; border: 1px solid var(--brd); background: var(--sur2); color: var(--mut);
}
.mod-vote-btn:hover { border-color: var(--acc); color: var(--acc); }
.mod-vote-btn.voted { background: rgba(255,107,157,0.15); border-color: var(--acc); color: var(--acc); }
.mod-vote-btn.both { background: rgba(255,107,157,0.25); border-color: var(--acc); color: var(--acc); }

.mod-vote-tally {
  font-size: 9px; color: var(--mut); margin-top: 5px; letter-spacing: 1px; min-height: 14px;
}

.mod-actions { display: flex; gap: 8px; }
.mod-actions .btn { margin-bottom: 0; }
.mod-normal-btn {
  flex: 1; padding: 11px; font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 14px; letter-spacing: 2px; border: 1px solid var(--brd); background: transparent;
  color: var(--mut); border-radius: 6px; cursor: pointer; transition: all .15s;
}
.mod-normal-btn:hover { border-color: var(--txt); color: var(--txt); }
.mod-normal-count { font-size: 9px; color: var(--mut); margin-top: 3px; letter-spacing: 1px; }

/* Active modifiers display strip */
.active-mods-strip {
  display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px;
  justify-content: center;
}
.active-mod-pill {
  background: rgba(255,107,157,0.12); border: 1px solid rgba(255,107,157,0.3);
  border-radius: 20px; padding: 3px 10px; font-size: 10px; color: var(--acc);
  letter-spacing: 1px; display: flex; align-items: center; gap: 4px;
}

/* Peek hint display */
.peek-ranges {
  background: rgba(255,107,157,0.07); border: 1px solid rgba(255,107,157,0.2);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; text-align: center;
}
.peek-ranges-title { font-size: 10px; letter-spacing: 2px; color: var(--rose); margin-bottom: 6px; }
.peek-ranges-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.peek-range-pill {
  padding: 4px 12px; border-radius: 20px; font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 14px; letter-spacing: 1px;
}
.peek-range-pill.contains { background: rgba(255,107,157,0.2); border: 1px solid var(--acc); color: var(--acc); }
.peek-range-pill.wrong { background: rgba(255,51,88,0.1); border: 1px solid rgba(255,51,88,0.3); color: var(--mut); text-decoration: line-through; }

/* ── DUEL PANELS ── */
.duel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
.pside {
  background: rgba(26,10,16,0.9); border: 1px solid var(--brd); border-radius: 10px;
  padding: 13px 12px; text-align: center; transition: border-color .3s, box-shadow .3s;
  position: relative; overflow: hidden;
}
.pside::before { content:''; position:absolute; inset:0; background:transparent; transition:background .3s; pointer-events:none; }
.pside.active { border-color: var(--acc); box-shadow: 0 0 0 1px var(--acc) inset, 0 0 28px rgba(255,107,157,0.14); animation: turnPulse 2s ease-in-out infinite; }
.pside.active::before { background: rgba(255,107,157,0.03); }
@keyframes turnPulse {
  0%,100%{box-shadow:0 0 0 1px var(--acc) inset,0 0 16px rgba(255,107,157,0.1)}
  50%{box-shadow:0 0 0 1px var(--acc) inset,0 0 32px rgba(255,107,157,0.28)}
}
.pname { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 18px; letter-spacing: 2px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pturn { font-size: 9px; letter-spacing: 1px; color: var(--acc); margin-bottom: 4px; min-height: 13px; }
.pnum { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 11px; color: var(--mut); margin-bottom: 2px; }
.pranges { font-size: 10px; color: var(--mut); margin-bottom: 4px; }
.pranges span { color: var(--blu); }
.pguesses { font-size: 10px; color: var(--mut); }
.pguesses span { color: var(--cream); font-family: 'Bebas Neue', Impact, sans-serif; font-size: 14px; }
.pscore { font-size: 10px; color: var(--mut); margin-top: 3px; }
.pstreak-badge {
  display: inline-block; background: linear-gradient(135deg, #ff4400, #ff8800);
  color: #fff; font-family: 'Bebas Neue', Impact, sans-serif; font-size: 11px;
  letter-spacing: 1.5px; padding: 2px 8px; border-radius: 20px; margin-top: 3px;
  animation: streakPop .3s cubic-bezier(0.34,1.6,0.64,1);
}
@keyframes streakPop { from{transform:scale(0.6);opacity:0} to{transform:scale(1);opacity:1} }

.fire-banner {
  background: linear-gradient(135deg, rgba(255,68,0,0.18), rgba(255,136,0,0.12));
  border: 1px solid rgba(255,120,0,0.4); border-radius: 8px; padding: 8px 14px;
  margin-bottom: 8px; color: #ffb347; text-align: center; letter-spacing: 1.5px;
  font-family: 'Bebas Neue', Impact, sans-serif; font-size: 14px; animation: fi .3s ease;
}

.range-bar-wrap { margin: 4px 0 2px; }
.range-bar-track { height: 3px; background: var(--brd); border-radius: 2px; overflow: hidden; }
.range-bar-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--acc)); border-radius: 2px; transition: width .5s ease; }
.range-label { font-size: 9px; color: var(--mut); text-align: center; margin-top: 2px; letter-spacing: 1px; }

.dc-banner { border-radius: 8px; padding: 9px 14px; margin-bottom: 8px; font-size: 11px; text-align: center; letter-spacing: 1px; animation: fi .3s ease; }
.dc-banner.tier1 { background: rgba(255,179,71,0.1); border: 1px solid rgba(255,179,71,0.35); color: var(--amber); }
.dc-banner.tier2 { background: rgba(255,179,71,0.06); border: 1px solid rgba(255,179,71,0.2); color: rgba(255,179,71,0.6); }

/* ── GUESS CARD ── */
.gcard {
  background: rgba(26,10,16,0.9); border: 1px solid var(--brd); border-radius: 10px;
  padding: 14px; margin-bottom: 8px; backdrop-filter: blur(8px);
}
.gcard.my-turn { border-color: rgba(255,107,157,0.4); box-shadow: 0 0 20px rgba(255,107,157,0.06); }
.gtitle { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 13px; letter-spacing: 2px; color: var(--mut); margin-bottom: 3px; }
.gtarget { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--acc); margin-bottom: 10px; }
.ga { display: flex; gap: 8px; }
.ga input { flex: 1; }
.gbtn {
  background: var(--acc); color: #0f0508; border: none; border-radius: 6px;
  padding: 9px 18px; font-family: 'Bebas Neue', Impact, sans-serif; font-size: 17px;
  letter-spacing: 2px; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.gbtn:hover { background: var(--acc2); box-shadow: 0 4px 14px rgba(255,107,157,0.32); }
.gbtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.waiting-label { text-align: center; color: var(--mut); font-size: 12px; padding: 10px 0 6px; letter-spacing: 1px; font-style: italic; }

/* Telepathy cooldown */
.tele-cd { font-size: 10px; color: var(--mut); text-align: center; margin-top: 4px; letter-spacing: 1px; min-height: 14px; }
.tele-cd.active { color: var(--amber); }

/* ── WIN PROB BAR ── */
.prob-bar-wrap { margin: 6px 0; padding: 0 2px; }
.prob-bar-label-row { display: flex; justify-content: space-between; font-size: 9px; color: var(--mut); letter-spacing: 1px; margin-bottom: 3px; text-transform: uppercase; }
.prob-bar-label-row span:first-child { color: var(--acc); }
.prob-bar-track { height: 6px; background: var(--brd); border-radius: 3px; overflow: hidden; position: relative; }
.prob-bar-me { position: absolute; left: 0; top: 0; height: 100%; background: linear-gradient(90deg, var(--rose), var(--acc)); border-radius: 3px 0 0 3px; transition: width .6s cubic-bezier(0.34,1.2,0.64,1); }
.prob-bar-divider { position: absolute; left: 50%; top: -1px; bottom: -1px; width: 1px; background: var(--bg); opacity: 0.6; }
.prob-bar-pct { text-align: center; font-size: 9px; color: var(--mut); margin-top: 2px; letter-spacing: 1px; }

/* ── TYPING INDICATOR ── */
.typing-indicator { font-size: 10px; color: var(--rose); letter-spacing: 1px; text-align: center; min-height: 14px; margin: 2px 0 4px; animation: typingFade 0.3s ease; }
@keyframes typingFade { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
.typing-dots span { display: inline-block; animation: typingDot 1.2s infinite; font-size: 14px; line-height: 1; }
.typing-dots span:nth-child(2){animation-delay:.2s} .typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes typingDot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

/* ── CHAT FEED ── */
.chat-panel { background: rgba(15,5,8,0.7); border: 1px solid var(--brd); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.chat-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--brd); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--mut); }
.chat-hist-btn { background: var(--sur2); border: 1px solid var(--brd); color: var(--mut); padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: all .15s; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; }
.chat-hist-btn:hover { border-color: var(--acc); color: var(--acc); }
.chat-feed { height: 140px; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 5px; scroll-behavior: smooth; }
.chat-feed::-webkit-scrollbar { width: 3px; }
.chat-feed::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 2px; }
.chat-msg { display: flex; flex-direction: column; max-width: 80%; animation: msgIn .2s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
.chat-msg.mine { align-self: flex-end; align-items: flex-end; }
.chat-msg.theirs { align-self: flex-start; align-items: flex-start; }
.chat-bubble { padding: 6px 11px; border-radius: 14px; font-size: 12px; line-height: 1.4; word-break: break-word; }
.chat-msg.mine .chat-bubble { background: rgba(255,107,157,0.18); border: 1px solid rgba(255,107,157,0.3); color: var(--cream); border-bottom-right-radius: 4px; }
.chat-msg.theirs .chat-bubble { background: rgba(34,13,21,0.9); border: 1px solid var(--brd); color: var(--txt); border-bottom-left-radius: 4px; }
.chat-name { font-size: 9px; color: var(--mut); margin-bottom: 2px; letter-spacing: 1px; }
.chat-system { align-self: center; font-size: 10px; color: var(--mut); font-style: italic; text-align: center; padding: 2px 0; }
.chat-input-row { display: flex; gap: 6px; padding: 8px 10px; border-top: 1px solid var(--brd); align-items: center; }
.chat-quick-btn { background: var(--sur2); border: 1px solid var(--brd); color: var(--acc); font-size: 14px; padding: 6px 9px; border-radius: 6px; cursor: pointer; transition: all .15s; flex-shrink: 0; line-height: 1; }
.chat-quick-btn:hover { border-color: var(--acc); background: rgba(255,107,157,0.08); }

<body>

<div class="hearts-bg" id="heartsBg"></div>

<script>
// ── HEARTS BACKGROUND ─────────────────────────────────────────
let heartSpawnSymbols = ["♥","♡","💕","❤","✦","🌸","✿","·","♥","♡"];
(function spawnHearts(){
  const bg=document.getElementById("heartsBg");
  function spawn(){
    const h=document.createElement("div");
    h.className="heart-particle";
    h.textContent=heartSpawnSymbols[Math.floor(Math.random()*heartSpawnSymbols.length)];
    const sz=6+Math.random()*16;
    const isSakura=document.body.classList.contains("mod-sakura");
    const col=isSakura
      ?`rgba(255,${Math.floor(150+Math.random()*50)},${Math.floor(180+Math.random()*50)},${0.18+Math.random()*0.18})`
      :`rgba(255,${Math.floor(80+Math.random()*70)},${Math.floor(110+Math.random()*80)},${0.12+Math.random()*0.14})`;
    h.style.cssText=`left:${Math.random()*100}%;font-size:${sz}px;animation-duration:${10+Math.random()*14}s;animation-delay:${Math.random()*8}s;color:${col};`;
    bg.append(h);
    setTimeout(()=>h.remove(),(24+Math.random()*14)*1000);
  }
  for(let i=0;i<28;i++) setTimeout(spawn,i*280);
  setInterval(spawn,900);
})();

// ── PARALLAX ─────────────────────────────────────────────────
(function(){
  const bg=document.getElementById("heartsBg");
  document.addEventListener("mousemove",e=>{
    const mx=(e.clientX/window.innerWidth-0.5)*18;
    const my=(e.clientY/window.innerHeight-0.5)*10;
    bg.style.transform=`translate(${mx}px,${my}px) scale(1.04)`;
  });
})();

// ── EFFECTS ──────────────────────────────────────────────────
function triggerBurst(){
  const layer=document.getElementById("burstLayer");
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  const bsyms=["💕","✦","♥","🌸","💗","❤️","✨"];
  for(let i=0;i<18;i++){
    const b=document.createElement("div"); b.className="burst-heart";
    const angle=(i/18)*Math.PI*2, dist=80+Math.random()*160;
    b.textContent=bsyms[Math.floor(Math.random()*bsyms.length)];
    b.style.cssText=`left:${cx}px;top:${cy}px;--tx:translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist-100}px);animation-duration:${0.7+Math.random()*0.5}s;animation-delay:${Math.random()*0.15}s;font-size:${18+Math.random()*18}px;`;
    layer.append(b); setTimeout(()=>b.remove(),1200);
  }
}

function triggerCupidArrow(){
  const layer=document.getElementById("arrowLayer");
  const a=document.createElement("div"); a.className="cupid-arrow";
  const y=20+Math.random()*60;
  a.style.cssText=`top:${y}%;left:0;animation-duration:${0.7+Math.random()*0.4}s;`;
  a.textContent="💘";
  layer.append(a); setTimeout(()=>a.remove(),1500);
}

function triggerDramaFlash(type){
  const flash=document.createElement("div"); flash.className="drama-flash";
  flash.style.background=type==="higher"?"rgba(100,160,255,0.35)":"rgba(255,80,80,0.35)";
  document.body.append(flash);
  document.getElementById("app").style.animation="screenShake 0.4s ease";
  setTimeout(()=>{flash.remove();document.getElementById("app").style.animation="";},500);
}

function triggerGlitter(x,y){
  const layer=document.getElementById("efloat");
  const syms=["✨","⭐","💫","✦","★"];
  for(let i=0;i<6;i++){
    const g=document.createElement("div"); g.className="emoji-floater";
    g.textContent=syms[Math.floor(Math.random()*syms.length)];
    g.style.cssText=`left:${x+(Math.random()-0.5)*60}px;top:${y-20}px;font-size:${14+Math.random()*12}px;animation-duration:${0.9+Math.random()*0.5}s;`;
    layer.append(g); setTimeout(()=>g.remove(),1800);
  }
}

// ── FIREBASE ─────────────────────────────────────────────────
const DB="https://guessr-7c5b6-default-rtdb.firebaseio.com";
async function fbGet(p){try{const r=await fetch(DB+p+".json");return r.json();}catch{return null;}}
async function fbSet(p,d){await fetch(DB+p+".json",{method:"PUT",body:JSON.stringify(d)});}
async function fbUpdate(p,d){await fetch(DB+p+".json",{method:"PATCH",body:JSON.stringify(d)});}
async function fbPush(p,d){const r=await fetch(DB+p+".json",{method:"POST",body:JSON.stringify(d)});return r.json();}

// ── STATE ─────────────────────────────────────────────────────
let pollTimer=null, lastHash="", lastReactionCount=0;
let typingTimer=null, lastTypingState=false;
let roundHistory=[], lastChatCount=0;
let telepathyCooldown=false, telepathyCdTimer=null;

let S={screen:"home",username:"",roomCode:"",isHost:false,roomData:null,round:1};

const TAUNT_PRESETS=["not even close 💀","getting warmer 🔥","you'll never get it 😏","try harder babe 💅","lucky guess? 😤","I'm in your head 🧠","skill issue 💅","touch grass first 🌿"];
const EMOJI_LIST=["❤️","😤","💀","🫦","😏","🔥","💅","😘"];
const CHAT_EMOJIS=["💬","💕","✨","🌸","💭","🗨️","😏","❤️"];

const MAGIC8_LOWER=["The mists say... lower 🌫️","As I see it — lower","All signs point down","Cannot predict, but go lower","It is certain... lower","My sources say lower 🎱"];
const MAGIC8_WILD=["Ask again later 🎱","Better not tell you now","Concentrate and ask again"];

// ── MODIFIER DEFINITIONS ──────────────────────────────────────
const VISUAL_MODS = [
  { id:"midnight", icon:"🌙", name:"Midnight Mode", type:"visual",
    desc:"UI goes pitch black. All text dims to 30%. Only active elements glow — eerie, haunted vibes." },
  { id:"sakura", icon:"🌸", name:"Sakura", type:"visual",
    desc:"Heart particles become falling pink cherry blossoms. Soft, floaty, and way prettier." },

  { id:"colorflip", icon:"🎨", name:"Color Flip", type:"visual",

  { id:"retro", icon:"📺", name:"Retro CRT", type:"visual",

  { id:"violet", icon:"💜", name:"Violet Bloom", type:"visual",

  { id:"drama", icon:"🎭", name:"Drama", type:"visual",

  { id:"rainbow", icon:"🌈", name:"Rainbow", type:"visual",

const GAMEPLAY_MODS = [
  { id:"scrambled", icon:"🔀", name:"Scrambled", type:"gameplay",
    desc:"Higher and lower responses are SWAPPED. Everything you know is wrong. Good luck." },
  { id:"peek", icon:"👁️", name:"Peek", type:"gameplay",

  { id:"magic8", icon:"🎱", name:"Magic 8-Ball", type:"gameplay",

  { id:"secret", icon:"🤫", name:"Secret Agent", type:"gameplay",

function genCode(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join("");}

function el(tag,attrs={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="class")e.className=v;
    else if(k==="style")e.style.cssText=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  for(const c of kids){if(c==null)continue;e.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  return e;
}
const d=(cls,...c)=>el("div",{class:cls},...c);
const sp=(cls,t)=>el("span",{class:cls},t);

function render(){
  document.getElementById("app").innerHTML="";
  const screens={home:renderHome,lobby:renderLobby,picknumber:renderPickNumber,waitpick:renderWaitPick,modifiers:renderModifiers,game:renderGame,winner:renderWinner};
  document.getElementById("app").appendChild((screens[S.screen]||renderHome)());
}

// ── MODIFIER HELPERS ──────────────────────────────────────────
function getActiveModifiers(data){
  return data.activeModifiers ? Object.values(data.activeModifiers) : [];
}

function hasMod(data, id){
  return getActiveModifiers(data).includes(id);
}

function applyVisualMods(data){
  const mods=getActiveModifiers(data);
  const allModClasses=["mod-midnight","mod-sakura","mod-cupid","mod-colorflip","mod-retro","mod-glitter","mod-letter","mod-violet","mod-drama","mod-rainbow"];
  allModClasses.forEach(c=>document.body.classList.remove(c));
  mods.forEach(m=>document.body.classList.add("mod-"+m));
  if(mods.includes("sakura")){
    heartSpawnSymbols=["🌸","🌸","🌸","🌸","🌺","🌷","🌸","✿"];
  } else {
    heartSpawnSymbols=["♥","♡","💕","❤","✦","🌸","✿","·","♥","♡"];
  }
}

function removeVisualMods(){
  ["mod-midnight","mod-sakura","mod-cupid","mod-colorflip","mod-retro","mod-glitter","mod-letter","mod-violet","mod-drama","mod-rainbow"].forEach(c=>document.body.classList.remove(c));
  heartSpawnSymbols=["♥","♡","💕","❤","✦","🌸","✿","·","♥","♡"];
}

// Seeded random pick of 4 modifiers (2 visual, 2 gameplay) using room code as seed
function pickModifiers(roomCode){
  let seed=0;
  for(let i=0;i<roomCode.length;i++) seed=(seed*31+roomCode.charCodeAt(i))>>>0;
  function seededRand(max){ seed=(seed*1664525+1013904223)>>>0; return seed%max; }
  function shuffle(arr){
    const a=[...arr];
    for(let i=a.length-1;i>0;i--){ const j=seededRand(i+1); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  const vis=shuffle(VISUAL_MODS).slice(0,2);
  const gp=shuffle(GAMEPLAY_MODS).slice(0,2);
  return [...vis,...gp];
}

// ── POLLING ──────────────────────────────────────────────────
function startPolling(code){
  stopPolling();lastHash="";
  pollTimer=setInterval(()=>poll(code),1200);
  setInterval(()=>{if(S.roomCode)fbUpdate(`/duels/${S.roomCode}/players/${S.username}`,{online:Date.now()});},4000);
}
function stopPolling(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

async function poll(code){
  const data=await fbGet(`/duels/${code}`);
  if(!data){stopPolling();S.screen="home";removeVisualMods();render();return;}
  const h=JSON.stringify(data);
  if(h===lastHash)return;
  lastHash=h;S.roomData=data;
  if(data.round)S.round=data.round;
  if(data.roundHistory)roundHistory=Object.values(data.roundHistory);

  const reactions=data.reactions?Object.values(data.reactions):[];
  if(reactions.length>lastReactionCount){
    reactions.slice(lastReactionCount).forEach(r=>floatEmoji(r.emoji));
    lastReactionCount=reactions.length;
  }
  const chats=data.taunts?Object.values(data.taunts):[];
  if(chats.length>lastChatCount){
    chats.slice(lastChatCount).forEach(c=>{
      if(c.player!==S.username){
        const em=CHAT_EMOJIS[Math.floor(Math.random()*CHAT_EMOJIS.length)];
        floatEmoji(em,15+Math.random()*20,50+Math.random()*20);
      }
    });
    lastChatCount=chats.length;
  }

  const prev=S.screen;
  const myData=data.players?.[S.username];

  if(data.status==="waiting"){
    if(prev!=="lobby"){S.screen="lobby";render();}else patchLobby(data);
  } else if(data.status==="picking"){
    if(!myData?.number){
      if(prev!=="picknumber"){S.screen="picknumber";render();}
    } else {
      if(prev!=="waitpick"){S.screen="waitpick";render();}
    }
  } else if(data.status==="modifiers"){
    if(prev!=="modifiers"){S.screen="modifiers";render();}
    else patchModifiers(data);
  } else if(data.status==="playing"){
    applyVisualMods(data);
    if(prev!=="game"){S.screen="game";lastReactionCount=Object.values(data.reactions||{}).length;lastChatCount=Object.values(data.taunts||{}).length;render();}
    else patchGame(data);
  } else if(data.status==="finished"){
    if(prev!=="winner"){S.screen="winner";render();launchConfetti();}
  }
}

async function startFromModifiers(){
  if(!S.isHost)return;

  const active=[];

    if(votes.length>=2)active.push(id);
  });

  const players=Object.keys(data.players||{});
  const first=players[Math.floor(Math.random()*players.length)];

      const oppNum=data.players[opp].number;
      peekRanges[p]=buildPeekRanges(oppNum,data.min,data.max);
    });

  const telepathyMode=active.includes("telepathy");

  await fbUpdate(`/duels/${S.roomCode}`,{
    status:"playing",
    turn:telepathyMode?null:first,
    guesses:null,taunts:null,reactions:null,typing:null,
    activeModifiers:active.length>0?active.reduce((acc,id,i)=>{acc[i]=id;return acc;},{}):{},
    peekRanges:peekRanges||null
  });
}

function buildPeekRanges(target, min, max){
  // 3 ranges: 2 wrong, 1 correct. Range width ~10% of total range
  const span=Math.max(8, Math.floor((max-min)*0.1));
  const halfSpan=Math.floor(span/2);
  // Correct range contains target
  const correctLo=Math.max(min, target-halfSpan);
  const correctHi=Math.min(max, target+halfSpan);
  // 2 wrong ranges that don't overlap correct range and each other
  const wrongRanges=[];
  let attempts=0;
  while(wrongRanges.length<2 && attempts<50){
    attempts++;
    const center=min+Math.floor(Math.random()*(max-min));
    const lo=Math.max(min,center-halfSpan), hi=Math.min(max,center+halfSpan);
    // Must not overlap correct range
    if(hi<correctLo-2||lo>correctHi+2){
      // Must not overlap previously added wrong range
      const overlaps=wrongRanges.some(r=>!(hi<r.lo-2||lo>r.hi+2));
      if(!overlaps) wrongRanges.push({lo,hi,correct:false});
    }
  }
  // Shuffle the 3 ranges
  const all=[{lo:correctLo,hi:correctHi,correct:true},...wrongRanges];
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  return all;
}

function renderHistPop(histPop,data,me){

  myG.forEach(g=>{
    const cls=g.result==="higher"?"h":g.result==="lower"?"l":"c";
    const raw=g.result;
    const displayResult=g.result==="correct"?"correct":g.result;
    const row=d("hist-entry "+cls);
    row.append(
      el("span",{class:"hist-entry-num"},String(g.guess)),
      el("span",{class:"hist-entry-ico"},raw==="higher"?"👆":raw==="lower"?"👇":"💕"),
      el("span",{class:"hist-entry-who"},displayResult.toUpperCase())

}

function renderGuessCard(gc,data,me,opp,myTurn){
  gc.innerHTML="";
  gc.className="gcard"+(myTurn?" my-turn":"");

  const scrambled=hasMod(data,"scrambled");
  const magic8=hasMod(data,"magic8");

  if(myTurn||telepathy){
    const {lo,hi}=computeRange(data,me,opp,scrambled);
    const label=magic8?"YOUR TURN — CONSULT THE BALL":"YOUR TURN — GUESS THEIR NUMBER";
    gc.append(el("div",{class:"gtitle"},label),el("div",{class:"gtarget",id:"grange"},`Possible: ${lo}–${hi}`));
    const ga=d("ga");
    const gi=el("input",{type:"number",placeholder:`${lo}–${hi}`,id:"gi",min:String(lo),max:String(hi),autocomplete:"off"});
    gi.addEventListener("keydown",e=>{if(e.key==="Enter")submitGuess();});
    gi.addEventListener("input",()=>broadcastTyping(true));
    gi.addEventListener("blur",()=>broadcastTyping(false));
    const gbtn=el("button",{class:"gbtn",id:"gbtn"},"GUESS");
    gbtn.addEventListener("click",submitGuess);
    if(telepathy&&telepathyCooldown) gbtn.disabled=true;
    ga.append(gi,gbtn); gc.append(ga);
    if(telepathy){
      const cdLabel=el("div",{class:"tele-cd"+(telepathyCooldown?" active":""),id:"telecd"},telepathyCooldown?"⏳ 3s cooldown...":"both guessing simultaneously 🫶");
      gc.append(cdLabel);
    }
    setTimeout(()=>{const g=document.getElementById("gi");if(g)g.focus();},80);
  } else {
    gc.append(el("div",{class:"waiting-label"},"Opponent's turn — sit tight... 💭"));
  }
}

function patchGame(data){
  if(!data)return;
  const players=Object.keys(data.players||{});
  const me=S.username;
  const opp=players.find(p=>p!==me)||"Opponent";
  const telepathy=hasMod(data,"telepathy");
  const myTurn=telepathy?true:data.turn===me;

  const mypt=document.getElementById("mypturn"),oppt=document.getElementById("oppturn");
  const myside=document.getElementById("myside"),oppside=document.getElementById("oppside");
  const wasMine=!!document.getElementById("gi");

    if(mypt)mypt.textContent=myTurn?"← YOUR TURN":"";
    if(oppt)oppt.textContent=myTurn?"":"← THEIR TURN";
    if(myside)myside.className="pside"+(myTurn?" active":"");
    if(oppside)oppside.className="pside"+(myTurn?" active":"");
    if(myTurn&&!wasMine)SFX.yourTurn();
  }

  // AFK
  const now=Date.now();
  const oppOnline=data.players?.[opp]?.online||0;
  const existingBanner=document.querySelector(".dc-banner");
  if(oppOnline){
    const gap=now-oppOnline;
    if(gap>720000){
      if(!existingBanner||!existingBanner.classList.contains("tier2")){
        if(existingBanner)existingBanner.remove();
        const banner=d("dc-banner tier2",`👻 ${opp} is probably AFK — sit tight`);
        document.querySelector(".duel")?.parentNode.insertBefore(banner,document.querySelector(".duel"));
      }
    } else if(gap>240000){
      if(!existingBanner){
        const banner=d("dc-banner tier1",`⏳ ${opp} may be AFK`);
        document.querySelector(".duel")?.parentNode.insertBefore(banner,document.querySelector(".duel"));
      }
    } else if(existingBanner)existingBanner.remove();
  } else if(existingBanner)existingBanner.remove();

  // Typing
  const typingEl=document.getElementById("typingindicator");
  if(typingEl){
    const oppTypingTs=data.typing?.[opp];
    const oppIsTyping=oppTypingTs&&(Date.now()-oppTypingTs)<5000;
    typingEl.innerHTML=oppIsTyping?`<span style="color:var(--rose)">${opp} is typing</span> <span class="typing-dots"><span>•</span><span>•</span><span>•</span></span>`:"";
  }

  // Range bars
  const scrambled=hasMod(data,"scrambled");
  ["my","opp"].forEach(who=>{
    const bar=document.getElementById(who+"rangebar");
    if(!bar)return;
    const guesser=who==="my"?me:opp, target=who==="my"?opp:me;
    const {lo,hi}=computeRange(data,guesser,target,scrambled);
    const total=(data.max||100)-(data.min||1);
    const pct=total>0?Math.max(5,Math.round(((hi-lo)/total)*100)):100;
    const fill=bar.querySelector(".range-bar-fill"),label=bar.querySelector(".range-label");
    if(fill)fill.style.width=pct+"%";
    if(label)label.textContent=`${lo}–${hi} (${hi-lo+1} possible)`;
  });

  // Win prob
  const probMe=document.getElementById("probme"),probPct=document.getElementById("probpct");
  if(probMe&&probPct){
    const myR=computeRange(data,me,opp,scrambled),oppR=computeRange(data,opp,me,scrambled);
    const mySpan=myR.hi-myR.lo+1,oppSpan=oppR.hi-oppR.lo+1,total=mySpan+oppSpan;
    const myPct=total>0?Math.round((oppSpan/total)*100):50;
    probMe.style.width=myPct+"%"; probPct.textContent=`${myPct}% · ${100-myPct}%`;
  }

  const allGuesses=data.guesses?Object.values(data.guesses):[];
  const mgc=document.getElementById("myguesscount"),ogc=document.getElementById("oppguesscount");
  if(mgc)mgc.innerHTML=`Guesses: <span>${allGuesses.filter(g=>g.player===me).length}</span>`;
  if(ogc)ogc.innerHTML=`Guesses: <span>${allGuesses.filter(g=>g.player===opp).length}</span>`;
  const myrange=document.getElementById("myrange"),opprange=document.getElementById("opprange");
  if(myrange){const{lo,hi}=computeRange(data,me,opp,scrambled);myrange.innerHTML=`Guessing: <span>${lo}–${hi}</span>`;}
  if(opprange){const{lo,hi}=computeRange(data,opp,me,scrambled);opprange.innerHTML=`Opp range: <span>${lo}–${hi}</span>`;}

  // Guess card update
  const gc=document.getElementById("guesscard");
  const hasInput=!!document.getElementById("gi");
  if(gc){
    if(!telepathy){
      if(myTurn!==hasInput) renderGuessCard(gc,data,me,opp,myTurn);
      else if(myTurn&&hasInput){
        const {lo,hi}=computeRange(data,me,opp,scrambled);
        const gr=document.getElementById("grange"),gi=document.getElementById("gi");
        if(gr)gr.textContent=`Possible: ${lo}–${hi}`;
        if(gi){gi.min=String(lo);gi.max=String(hi);gi.placeholder=`${lo}–${hi}`;}
      }

  // Chat feed — append new messages only
  const feed=document.getElementById("chatfeed");
  if(feed){
    const taunts=data.taunts?Object.values(data.taunts).sort((a,b)=>a.ts-b.ts):[];
    const current=feed.children.length;
    if(current!==taunts.length){
      taunts.slice(current).forEach(item=>{
        const isMe=item.player===me;

        wrap.append(d("chat-bubble",item.text));
        feed.append(wrap);
      });
      feed.scrollTop=feed.scrollHeight;
    }
    if(!taunts.length&&!feed.children.length)feed.append(d("chat-system","No messages yet — say something 💕"));
  }
}

function computeRange(data, guesser, target, scrambled=false){
  let lo=data.min||1, hi=data.max||100;
  // Shrinking modifier
  if(hasMod(data,"shrinking")){
    const allG=data.guesses?Object.values(data.guesses):[];
    const shrinkSteps=Math.floor(allG.length/3);
    const shrinkAmt=Math.floor((data.max-data.min)*0.1);
    for(let i=0;i<shrinkSteps;i++){lo=Math.min(lo+shrinkAmt,Math.floor((lo+hi)/2));hi=Math.max(hi-shrinkAmt,Math.ceil((lo+hi)/2));}
  }
  const guesses=data.guesses?Object.values(data.guesses):[];
  guesses.filter(g=>g.player===guesser).forEach(g=>{
    // Scrambled: swap higher/lower interpretation
    const trueResult=scrambled?(g.result==="higher"?"lower":g.result==="lower"?"higher":g.result):g.result;
    if(trueResult==="higher"&&g.guess>lo)lo=g.guess+1;
    if(trueResult==="lower"&&g.guess<hi)hi=g.guess-1;
  });
  return{lo:Math.max(data.min||1,lo),hi:Math.min(data.max||100,hi)};
}

function buildRangeBar(id,data,guesser,target,minVal,maxVal){
  const wrap=d("range-bar-wrap"); wrap.id=id;
  const {lo,hi}=computeRange(data,guesser,target);
  const total=(maxVal||100)-(minVal||1);
  const pct=total>0?Math.max(5,Math.round(((hi-lo)/total)*100)):100;
  const track=d("range-bar-track"),fill=d("range-bar-fill");
  fill.style.width=pct+"%"; track.append(fill);
  const label=d("range-label"); label.textContent=`${lo}–${hi} (${hi-lo+1} possible)`;
  wrap.append(track,label); return wrap;
}

async function submitGuess(){
  const data=S.roomData;
  if(!data)return;
  const players=Object.keys(data.players||{});
  const opp=players.find(p=>p!==S.username);
  if(!opp)return;
  const telepathy=hasMod(data,"telepathy");
  const scrambled=hasMod(data,"scrambled");
  const magic8=hasMod(data,"magic8");
  const cupid=hasMod(data,"cupid");
  const drama=hasMod(data,"drama");
  const glitter=hasMod(data,"glitter");
  if(!telepathy&&data.turn!==S.username)return;
  if(telepathy&&telepathyCooldown)return;
  const input=document.getElementById("gi");
  if(!input)return;
  const guess=parseInt(input.value);
  if(isNaN(guess)||guess<(data.min||1)||guess>(data.max||100)){
    SFX.blocked();input.classList.remove("shake");void input.offsetWidth;input.classList.add("shake");setTimeout(()=>input.classList.remove("shake"),500);return;
  }
  const allPast=data.guesses?Object.values(data.guesses):[];
  const myPast=allPast.filter(g=>g.player===S.username).map(g=>g.guess);
  if(myPast.includes(guess)){
    SFX.blocked();input.classList.remove("shake");void input.offsetWidth;input.classList.add("shake");setTimeout(()=>input.classList.remove("shake"),500);
    const existing=document.getElementById("dup-msg");
    if(!existing){const msg=el("div",{id:"dup-msg",style:"font-size:10px;color:var(--red);text-align:center;margin-top:4px;letter-spacing:1px"},`already tried ${guess}!`);input.parentNode.parentNode.append(msg);setTimeout(()=>msg.remove(),1800);}
    return;
  }

  if(cupid)triggerCupidArrow();
  if(glitter){const r=input.getBoundingClientRect();triggerGlitter(r.left+r.width/2,r.top);}

  broadcastTyping(false);
  const oppNum=data.players[opp].number;
  const trueResult=guess===oppNum?"correct":guess>oppNum?"lower":"higher";
  // Scrambled: what we show the guesser is swapped (but stored result is real)
  const storedResult=trueResult; // Store real result for range computation
  input.value="";

  // Telepathy cooldown
  if(telepathy){
    telepathyCooldown=true;
    const gbtn=document.getElementById("gbtn");
    const cdLabel=document.getElementById("telecd");
    if(gbtn)gbtn.disabled=true;
    if(cdLabel){cdLabel.textContent="⏳ 3s cooldown...";cdLabel.classList.add("active");}
    let secs=3;
    const cdInterval=setInterval(()=>{
      secs--;
      const cl=document.getElementById("telecd");
      if(cl)cl.textContent=secs>0?`⏳ ${secs}s...`:"both guessing simultaneously 🫶";
      if(secs<=0){
        clearInterval(cdInterval);
        telepathyCooldown=false;
        const gb=document.getElementById("gbtn");
        if(gb)gb.disabled=false;
        const cdl=document.getElementById("telecd");
        if(cdl)cdl.classList.remove("active");
      }
    },1000);
  }

  if(trueResult==="correct"){SFX.correct();triggerBurst();}
  else if(trueResult==="higher")SFX.higher();
  else SFX.lower();

  if(drama&&trueResult!=="correct")triggerDramaFlash(trueResult);

  // For magic8: show cryptic result client-side immediately (the guess still stores real result)
  if(magic8&&trueResult!=="correct"){
    let pool=trueResult==="higher"?MAGIC8_HIGHER:MAGIC8_LOWER;
    if(Math.random()<0.15)pool=MAGIC8_WILD;
    const msg=pool[Math.floor(Math.random()*pool.length)];
    const existing=document.getElementById("m8msg");
    if(!existing){
      const m=el("div",{id:"m8msg",style:"font-size:11px;color:var(--acc);text-align:center;margin-top:6px;letter-spacing:1px;font-style:italic"},msg);
      const gc=document.getElementById("guesscard"); if(gc)gc.append(m);
      setTimeout(()=>m.remove(),3500);
    }
  }

  await fbPush(`/duels/${S.roomCode}/guesses`,{player:S.username,guess,result:storedResult,ts:Date.now()});

  if(trueResult==="correct"){
    const newScore=(data.players[S.username].score||0)+1;
    const newStreak=(data.players[S.username].streak||0)+1;
    const allGuesses=data.guesses?Object.values(data.guesses):[];
    const myG=allGuesses.filter(g=>g.player===S.username).length+1;
    const oppG=allGuesses.filter(g=>g.player===opp).length;
    const isLucky=myG===1;
    await fbPush(`/duels/${S.roomCode}/roundHistory`,{round:S.round,winner:S.username,myGuesses:myG,oppGuesses:oppG,myNum:data.players[S.username].number,oppNum:data.players[opp].number});
    await fbUpdate(`/duels/${S.roomCode}`,{
      status:"finished",winner:S.username,winnerStreak:newStreak,luckyShot:isLucky||null,
      [`players/${S.username}/score`]:newScore,[`players/${S.username}/streak`]:newStreak,[`players/${opp}/streak`]:0,
    });
  } else {
    if(!telepathy)await fbUpdate(`/duels/${S.roomCode}`,{turn:opp});
  }
}

  sumCard.append(el("div",{class:"ctitle",style:"margin-top:14px;margin-bottom:10px"},"NUMBER REVEAL"));
  const revealWrap=d("num-reveal-wrap");
  [[me,myNum,"Your Number"],[opp,oppNum,`${opp}'s Number`]].forEach(([name,num,label])=>{
    const card2=d("num-reveal-card"); card2.append(el("div",{class:"num-reveal-label"},label));
    const val=el("div",{class:"num-reveal-val"},"—"); card2.append(val); revealWrap.append(card2);
    if(num){
      const target=parseInt(num),duration=900,steps=Math.min(target,28),stepTime=duration/steps;
      let current=0;
      const tick=()=>{const jump=Math.max(1,Math.round((target-current)/(steps-Math.floor(current/(target/steps))+1)));current=Math.min(current+jump,target);val.textContent=String(current);val.classList.remove("num-reveal-tick");void val.offsetWidth;val.classList.add("num-reveal-tick");if(current<target)setTimeout(tick,stepTime);else card2.classList.add("revealed");};
      setTimeout(tick,200+Math.random()*150);
    }
  });
  sumCard.append(revealWrap);

  sumCard.append(el("div",{class:"sl",style:"margin-top:14px"},"SERIES SCORE"));
  const sb=d("duel");
  players.forEach(p=>{
    const streak=parseInt(data.players[p]?.streak)||0,score=parseInt(data.players[p]?.score)||0;
    const ps=d("pside"+(p===winner?" active":""));
    ps.append(el("div",{class:"pname"},p),el("div",{style:"font-family:Bebas Neue,Impact,sans-serif;font-size:32px;color:var(--acc);margin:4px 0"},score+" 💕"));
    if(streak>=2)ps.append(el("div",{class:"pstreak-badge"},`🔥 ${streak} STREAK`));
    sb.append(ps);
  });
  sumCard.append(sb);

  if(S.isHost){
    sumCard.append(el("button",{class:"btn rematch-btn",style:"margin-top:14px",onClick:nextRound},"💕 REMATCH"),el("button",{class:"btn bs",onClick:leaveRoom},"END GAME"));
  } else {
    sumCard.append(el("div",{style:"text-align:center;color:var(--mut);font-size:12px;margin-top:16px"},"Waiting for host to start rematch... 💕"));
  }
  screen.append(sumCard);

  const allHistory=data.roundHistory?Object.values(data.roundHistory):[];
  if(allHistory.length>0){
    const rhCard=d("card");
    rhCard.append(el("div",{class:"ctitle"},"ROUND HISTORY"));
    const toggle=el("button",{class:"rh-toggle"},`▼ Show ${allHistory.length} round${allHistory.length>1?"s":""}`);
    const list=d("rh-list"); let open=false;
    toggle.addEventListener("click",()=>{open=!open;list.classList.toggle("open",open);toggle.textContent=(open?"▲ Hide":"▼ Show")+` ${allHistory.length} round${allHistory.length>1?"s":""}`;});
    allHistory.sort((a,b)=>(a.round||0)-(b.round||0)).forEach(rh=>{
      const row=d("rh-row"),myR=rh.winner===me;
      row.append(el("span",{class:"rh-round"},`RND ${rh.round||"?"}`),el("span",{class:"rh-winner",style:myR?"color:var(--acc)":"color:var(--mut)"},rh.winner||"?"),el("span",{class:"rh-detail"},`${rh.myGuesses||"?"}g vs ${rh.oppGuesses||"?"}g`));
      list.append(row);
    });
    rhCard.append(toggle,list); screen.append(rhCard);
  }
  return screen;
}

async function nextRound(){
  if(!S.isHost)return;
  const data=S.roomData||{};
  const players=Object.keys(data.players||{});
  const playerReset={};
  players.forEach(p=>{playerReset[`players/${p}/number`]=null;playerReset[`players/${p}/ready`]=false;});
  lastReactionCount=0;lastTypingState=false;lastChatCount=0;
  const newPool=pickModifiers(S.roomCode+(S.round+1)).map(m=>m.id);
  await fbUpdate(`/duels/${S.roomCode}`,{
    status:"picking",winner:null,winnerStreak:null,luckyShot:null,guesses:null,turn:null,
    taunts:null,reactions:null,typing:null,activeModifiers:null,modifierVotes:null,normalVotes:null,
    peekRanges:null,modifierPool:newPool,round:(S.round||1)+1,...playerReset
  });
}

async function leaveRoom(){
  stopPolling();broadcastTyping(false);
  if(S.isHost)await fbDelete(`/duels/${S.roomCode}`);
  else await fbDelete(`/duels/${S.roomCode}/players/${S.username}`);
  Object.assign(S,{screen:"home",roomCode:"",isHost:false,roomData:null,round:1});
  lastReactionCount=0;lastTypingState=false;roundHistory=[];lastChatCount=0;
  removeVisualMods();render();
}

function launchConfetti(){
  const c=document.getElementById("conf");c.innerHTML="";
  const cols=["#ff6b9d","#ff3358","#ffd6e7","#c8385a","#ff9ec4","#fff0f5"];
  for(let i=0;i<110;i++){
    const p=document.createElement("div");p.className="cp";const s=5+Math.random()*8;
    p.style.cssText=`left:${Math.random()*100}%;top:0;background:${cols[Math.floor(Math.random()*cols.length)]};width:${s}px;height:${s}px;border-radius:${Math.random()>.4?"50%":"2px"};animation-duration:${1.8+Math.random()*2}s;animation-delay:${Math.random()*.7}s;`;
    c.append(p);setTimeout(()=>p.remove(),6000);
  }
}

// ── SOUND ────────────────────────────────────────────────────
const SFX=(()=>{
  let ctx=null;
  function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
  function tone(freq,type,vol,dur,delay=0){
    try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0,c.currentTime+delay);g.gain.linearRampToValueAtTime(vol,c.currentTime+delay+0.01);g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+delay+dur);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur+0.05);}catch(e){}
  }
  return{
    higher(){tone(440,'sine',0.18,0.12);tone(600,'sine',0.12,0.1,0.1);},
    lower(){tone(440,'sine',0.18,0.12);tone(300,'sine',0.12,0.1,0.1);},
    correct(){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.2,0.18,i*0.1));},
    yourTurn(){tone(880,'sine',0.15,0.08);tone(1100,'sine',0.1,0.08,0.1);},
    blocked(){tone(200,'sawtooth',0.1,0.15);},
  };
})();

render();
</script>
